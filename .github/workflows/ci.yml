name: CI

# Fast gate on every PR and push to main: the app's unit tests + a production
# build. (The Forge dev loop runs these in Docker via ./forge; this is the plain
# CI equivalent for the deployment pipeline.)

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
