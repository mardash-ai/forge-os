# Generated by Forge — ProvisionEnvironment (runtime-docker-compose).
# Do not hand-edit service topology; reprovision instead.
name: forge-forge-os

services:
  web:
    image: node:22-bookworm-slim
    working_dir: /app
    command: npm run dev
    # NODE_ENV is intentionally NOT pinned here: Next sets it per command
    # (dev -> development, build/start -> production). Forcing development
    # breaks `next build` prerendering.
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # C10 secrets (session key + cron service token) — injected from the Forge
      # secret store at dev-run time; the middleware verifies the session cookie
      # with AUTH_SESSION_SECRET and gates /api/cron/* on AUTH_SERVICE_TOKEN.
      - AUTH_SESSION_SECRET=${AUTH_SESSION_SECRET:-}
      - AUTH_SERVICE_TOKEN=${AUTH_SERVICE_TOKEN:-}
      # Google OAuth is a human step (a real Google app) — declared, unset locally.
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      # C3 · app event log — the app emits/reads its own events against the control
      # plane in dev. NOTE: `forge provision` regenerates this file and doesn't know
      # these vars — re-add them (and the data-plane below) after a re-provision.
      - FORGE_EVENTS_URL=${FORGE_EVENTS_URL:-http://host.docker.internal:3717}
      - FORGE_APP_NAME=${FORGE_APP_NAME:-forge-os}
      # C10 · the /auth/* rewrite proxies here (same image + role as prod's sidecar).
      - FORGE_DATA_PLANE_URL=${FORGE_DATA_PLANE_URL:-http://data-plane:3718}
    depends_on:
      - postgres
      - data-plane
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # C10 · Identity / Auth — the platform's HOSTED auth, run in dev as a single-app
  # Forge data-plane sidecar (the SAME image + role prod uses). Because it runs
  # single-app it INFERS the app, so the same-origin /auth/* proxy works identically
  # in dev and prod with no app param. It shares the control plane's state dir
  # (../.forge) so it sees the seeded owner + the same encrypted secret vault (hence
  # the same AUTH_SESSION_SECRET the web tier verifies with). Local http only:
  # FORGE_AUTH_INSECURE_COOKIES=1 issues non-Secure cookies. NOT written by
  # `forge provision` — re-add after a re-provision.
  data-plane:
    image: ghcr.io/mardash-ai/forge-data-plane:0.15.0@sha256:58b2868fa9a53fba6c722371a323317c8adc7495078ecad9839260506871c672
    pull_policy: missing
    environment:
      - PORT=3718
      - FORGE_APP_NAME=forge-os
      - FORGE_APP_REPO_PATH=/app
      - FORGE_STATE_DIR=/forge-state
      - FORGE_AUTH_INSECURE_COOKIES=1
      - FORGE_JOBS_FILE=/app/forge.jobs.json
    volumes:
      - ../.forge:/forge-state
      - .:/app:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3718/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=forge
      - POSTGRES_PASSWORD=forge
      - POSTGRES_DB=forge_os
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge -d forge_os"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  web_node_modules:
  postgres_data:
