# Generated by Forge — ProvisionEnvironment (runtime-docker-compose).
# Do not hand-edit service topology; reprovision instead.
name: forge-forge-os

services:
  web:
    image: node:22-bookworm-slim
    working_dir: /app
    command: npm run dev
    # NODE_ENV is intentionally NOT pinned here: Next sets it per command
    # (dev -> development, build/start -> production). Forcing development
    # breaks `next build` prerendering.
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # C3 · app event log — the app emits/reads its own events against the control
      # plane in dev (prod points at the data-plane sidecar). FORGE_APP_NAME lets the
      # client name the app: the multi-app control plane requires it, whereas the prod
      # single-app sidecar infers it (so prod `web` leaves it unset). NOTE: `forge
      # provision` regenerates this file and doesn't know these vars — re-add after a
      # re-provision.
      - FORGE_EVENTS_URL=${FORGE_EVENTS_URL:-http://host.docker.internal:3717}
      - FORGE_APP_NAME=${FORGE_APP_NAME:-forge-os}
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=forge
      - POSTGRES_PASSWORD=forge
      - POSTGRES_DB=forge_os
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge -d forge_os"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  web_node_modules:
  postgres_data:
