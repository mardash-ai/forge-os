# (Compose project name defaults to this directory's name, so each Builder
#  project gets its own isolated Forge control-plane instance.)

# The Forge CONTROL PLANE runs as a prebuilt image. This starter has no platform
# source of its own — it just points the control plane at THIS directory as the
# workspace and hands it the host Docker socket so Capabilities can run app work
# in Docker (Docker-out-of-Docker).
#
# This is the control plane (developer/orchestration) image — it carries the
# Forge runtime + Docker CLI. It is deliberately separate from the future Forge
# DATA PLANE image (production/deploy runtime), which will NOT ship developer
# dependencies.
services:
  api:
    image: ${FORGE_IMAGE:-ghcr.io/mardash-ai/forge-control-plane:0.19.0@sha256:d57148a1493be1405a683cb9f34962372e718d00e14504d5b00940c6d107a310}
    # Use a locally-present image if the registry copy isn't pulled yet.
    pull_policy: missing
    ports:
      - "${FORGE_PORT:-3717}:${FORGE_PORT:-3717}"
    environment:
      - PORT=${FORGE_PORT:-3717}
      # This project directory IS the Forge workspace. Every repo is a SINGLE
      # app: it lives at ./app (FORGE_APP_LAYOUT=single); Resource/Event state
      # lives in ./.forge.
      - FORGE_WORKSPACE=${PWD}
      - FORGE_STATE_DIR=${PWD}/.forge
      - FORGE_APP_LAYOUT=single
      # This project runs ONE app (single layout) — name it so the control plane's
      # hosted auth (C10) infers the app the way the prod single-app data-plane does,
      # letting the same-origin /auth/* proxy work identically in dev and prod.
      - FORGE_APP_NAME=forge-os
      # Local http dev only: issue non-Secure session cookies so they work over
      # http://localhost. Prod runs the data-plane behind TLS and omits this.
      - FORGE_AUTH_INSECURE_COOKIES=1
    volumes:
      # Talk to the host Docker daemon.
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount this project at the SAME absolute path host==container so nested
      # `docker compose` (run by Capabilities) resolves app bind-mounts on the
      # host daemon. Do not change this symmetry.
      - ${PWD}:${PWD}
    restart: unless-stopped
