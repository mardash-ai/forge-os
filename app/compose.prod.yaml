# Generated by Forge — Productionize (productionize-nextjs-compose).
# The CANONICAL production stack — exactly what `forge deploy` rolls (start-first,
# behind Traefik on the "proxy" network). Do not hand-edit service topology;
# re-run `forge productionize` instead. Secrets/passwords come from .env.prod
# (see .env.prod.example) and are NEVER committed here. Images are digest-pinned (R1).
name: forge-forge-os-prod

networks:
  proxy:
    external: true
  internal:
    driver: bridge

services:
  web:
    image: ghcr.io/mardash-ai/forge-os-app@sha256:0581377dc668c4181037faacba77bb851f66af8b4785db5f0835c1f2fafa7f99
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - FORGE_EVENTS_URL=http://data-plane:3718
      - FORGE_DATA_PLANE_URL=http://data-plane:3718
      - DATABASE_URL=postgres://forge:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.prod}@postgres:5432/forge_os
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - AUTH_SESSION_SECRET=${AUTH_SESSION_SECRET:?set AUTH_SESSION_SECRET in .env.prod (keep it STABLE across deploys) — a missing/empty session-signing key logs every signed-in user out on deploy}
      - AUTH_SERVICE_TOKEN=${AUTH_SERVICE_TOKEN:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - SMTP_URL=${SMTP_URL:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
    depends_on:
      postgres:
        condition: service_healthy
      data-plane:
        condition: service_started
    networks:
      - proxy
      - internal
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.forge-os.rule=Host(`forge-os.mardash.ai`)"
      - "traefik.http.routers.forge-os.entrypoints=websecure"
      - "traefik.http.routers.forge-os.tls=true"
      - "traefik.http.routers.forge-os.tls.certresolver=letsencrypt"
      - "traefik.http.services.forge-os.loadbalancer.server.port=3000"
      - "traefik.http.services.forge-os.loadbalancer.healthcheck.path=/api/health"
      - "traefik.http.services.forge-os.loadbalancer.healthcheck.interval=10s"

  data-plane:
    image: ghcr.io/mardash-ai/forge-data-plane:0.22.0@sha256:9de9a8a04ffd8b586ecaf8bf84ee7445edf3a71a8ecedf6cbd80c2498933da92
    restart: unless-stopped
    environment:
      - PORT=3718
      - FORGE_APP_NAME=forge-os
      - FORGE_APP_REPO_PATH=/app
      - FORGE_STATE_DIR=/forge-state
      - FORGE_SECRETS_KEY=${FORGE_SECRETS_KEY:-}
      - FORGE_APP_CALLBACK_HOST=web
      - FORGE_APP_CALLBACK_PORT=3000
      - FORGE_READINESS_PATH=/api/health
      # C15 (P2) uptime sampler — the data-plane periodically samples the app's C6 health so
      # /status.json gains an `uptime` section (rolling availability). Overridable from
      # app/.env.prod on the box; defaults on. HAND-ADDED — `forge productionize` does not emit
      # these yet, so a future re-productionize will DROP them until forge carries a sampler option.
      - FORGE_STATUS_SAMPLE=${FORGE_STATUS_SAMPLE:-1}
      - FORGE_STATUS_SAMPLE_INTERVAL=${FORGE_STATUS_SAMPLE_INTERVAL:-5m}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - AUTH_SESSION_SECRET=${AUTH_SESSION_SECRET:?set AUTH_SESSION_SECRET in .env.prod (keep it STABLE across deploys) — a missing/empty session-signing key logs every signed-in user out on deploy}
      - AUTH_SERVICE_TOKEN=${AUTH_SERVICE_TOKEN:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - SMTP_URL=${SMTP_URL:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
      - FORGE_JOBS_FILE=/app/forge.jobs.json
      - FORGE_THEME_FILE=/app/forge.theme.json
    volumes:
      - forge_state:/forge-state
      - ./forge.jobs.json:/app/forge.jobs.json:ro
      - ./forge.theme.json:/app/forge.theme.json:ro
    networks:
      - internal
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3718/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=forge
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.prod}
      - POSTGRES_DB=forge_os
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge -d forge_os"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  forge_state:
  postgres_data:
