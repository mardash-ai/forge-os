# Generated by Forge — ProvisionEnvironment (runtime-docker-compose).
# Do not hand-edit service topology; reprovision instead.
name: forge-forge-os

services:
  web:
    image: node:22-bookworm-slim
    working_dir: /app
    command: npm run dev
    # NODE_ENV is intentionally NOT pinned here: Next sets it per command
    # (dev -> development, build/start -> production). Forcing development
    # breaks `next build` prerendering.
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - AUTH_SESSION_SECRET=${AUTH_SESSION_SECRET:-}
      - AUTH_SERVICE_TOKEN=${AUTH_SERVICE_TOKEN:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - SMTP_URL=${SMTP_URL:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
      # C3 · app event log — the app emits/reads its own events against the control
      # plane in dev. NOTE: `forge provision` regenerates this file and doesn't know
      # these vars — re-add them (and the data-plane below) after a re-provision.
      - FORGE_EVENTS_URL=${FORGE_EVENTS_URL:-http://host.docker.internal:3717}
      - FORGE_APP_NAME=${FORGE_APP_NAME:-forge-os}
      # C10 · the /auth/* rewrite proxies here (same image + role as prod's sidecar).
      - FORGE_DATA_PLANE_URL=${FORGE_DATA_PLANE_URL:-http://data-plane:3718}
    depends_on:
      - postgres
      - data-plane
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # C10 · Identity / Auth — the platform's HOSTED auth, run in dev as a single-app
  # Forge data-plane sidecar (the SAME image + role prod uses). Because it runs
  # single-app it INFERS the app, so the same-origin /auth/* proxy works identically
  # in dev and prod with no app param. It shares the control plane's state dir
  # (../.forge) so it sees the seeded owner + the same encrypted secret vault (hence
  # the same AUTH_SESSION_SECRET the web tier verifies with). As of forge 0.17.0 it
  # also issues the SHORT-LIVED access `forge_session` + the opaque `forge_refresh`
  # cookie and serves POST /auth/refresh (P8/P9) — the refresh the middleware calls.
  # Local http only: FORGE_AUTH_INSECURE_COOKIES=1 issues non-Secure cookies. NOT
  # written by `forge provision` — re-add after a re-provision.
  #
  # As of forge 0.18.0 it ALSO serves the branded /theme.css (C16 — the --forge-*
  # tokens from forge.theme.json, mounted at /app via `.:/app:ro`, pointed at by
  # FORGE_THEME_FILE) and the public /status + /status.json (C15), which probe the
  # web tier's C6 health at FORGE_APP_CALLBACK_HOST:PORT + FORGE_READINESS_PATH.
  # These mirror what `forge productionize` bakes into compose.prod.yaml so dev and
  # prod theme + status behave identically. NOT written by `forge provision` — re-add
  # after a re-provision.
  data-plane:
    image: ghcr.io/mardash-ai/forge-data-plane:0.19.0@sha256:b05af0b672231b43b5f3f2bae6febc2b2a93aa794e988107fed69019fc342a58
    pull_policy: missing
    environment:
      - PORT=3718
      - FORGE_APP_NAME=forge-os
      - FORGE_APP_REPO_PATH=/app
      - FORGE_STATE_DIR=/forge-state
      - FORGE_AUTH_INSECURE_COOKIES=1
      - FORGE_JOBS_FILE=/app/forge.jobs.json
      - FORGE_THEME_FILE=/app/forge.theme.json
      - FORGE_APP_CALLBACK_HOST=web
      - FORGE_APP_CALLBACK_PORT=3000
      - FORGE_READINESS_PATH=/api/health
    volumes:
      - ../.forge:/forge-state
      - .:/app:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3718/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=forge
      - POSTGRES_PASSWORD=forge
      - POSTGRES_DB=forge_os
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge -d forge_os"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  web_node_modules:
  postgres_data:
